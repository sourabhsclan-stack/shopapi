apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shopapi-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shopapi
  minReplicas: 3              # Always keep minimum 3 pods
  maxReplicas: 10             # Scale up to maximum 10 pods
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # Scale up when CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80    # Scale up when memory > 80%