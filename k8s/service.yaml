apiVersion: v1
kind: Service
metadata:
  name: shopapi-service
  namespace: production
  labels:
    app: shopapi
spec:
  selector:
    app: shopapi              # Forward traffic to pods with this label
  ports:
    - name: http
      protocol: TCP
      port: 80                # Service listens on port 80
      targetPort: 3000        # Forwards to pod's port 3000
  type: NodePort              # Expose outside the cluster (for local testing)