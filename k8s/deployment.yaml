apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopapi
  namespace: production
  labels:
    app: shopapi
spec:
  replicas: 3                    # Run 3 copies of our app
  selector:
    matchLabels:
      app: shopapi
  strategy:
    type: RollingUpdate          # Zero downtime deployments
    rollingUpdate:
      maxSurge: 1                # Add 1 extra pod during update
      maxUnavailable: 0          # Never remove pod before new one is ready
  template:
    metadata:
      labels:
        app: shopapi
      annotations:
        prometheus.io/scrape: "true"    # Tell Prometheus to collect metrics
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: shopapi
          image: soura1598/shopapi:latest   # Your Docker Hub image
          imagePullPolicy: Always           # Always pull latest image
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: shopapi-config        # Load all values from ConfigMap
          resources:
            requests:
              cpu: "100m"         # Minimum CPU needed (100 millicores)
              memory: "128Mi"     # Minimum memory needed
            limits:
              cpu: "500m"         # Maximum CPU allowed
              memory: "512Mi"     # Maximum memory allowed
          livenessProbe:          # Is the app alive?
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15    # Wait 15s before first check
            periodSeconds: 20          # Check every 20s
            failureThreshold: 3        # Restart after 3 failures
          readinessProbe:         # Is the app ready to receive traffic?
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5     # Wait 5s before first check
            periodSeconds: 10          # Check every 10s
            failureThreshold: 3        # Remove from load balancer after 3 failures