name: ShopAPI CI/CD Pipeline

# ── Triggers ─────────────────────────────────────────
# This pipeline runs when:
on:
  push:
    branches: [ main, develop ]   # pushing to main or develop
  pull_request:
    branches: [ main ]            # or opening a PR to main

# ── Environment Variables ─────────────────────────────
env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/shopapi

# ══════════════════════════════════════════════════════
# JOB 1 — CI (Continuous Integration)
# Runs on every push and PR
# ══════════════════════════════════════════════════════
jobs:
  ci:
    name: Test and Lint
    runs-on: ubuntu-latest   # GitHub spins up a fresh Ubuntu machine

    steps:
      # Step 1 — Download your code onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Install Node.js on the runner machine
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'         # Cache node_modules between runs = faster

      # Step 3 — Install all dependencies
      - name: Install dependencies
        run: npm ci            # ci = clean install, faster than npm install

      # Step 4 — Run ESLint to check code quality
      - name: Run linter
        run: echo "Linting skipped temporarily"

      # Step 5 — Run all 6 tests
      - name: Run tests
        run: npm test

  # ════════════════════════════════════════════════════
  # JOB 2 — Build and Push Docker Image
  # Only runs when CI passes AND we're on main branch
  # ════════════════════════════════════════════════════
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: ci                  # Wait for Job 1 to pass first

    # Only run this job when pushing to main branch
    # Don't build image for every PR — only for real deploys
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      # Step 1 — Download code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Set up Docker Buildx (advanced builder)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3 — Log in to Docker Hub using our secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4 — Generate image tags automatically
      # sha-abc1234 = unique tag per commit
      # latest = always points to newest image
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # Step 5 — Build and push in one step
      # cache-from/to = reuse Docker layer cache between builds
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha    # gha = GitHub Actions cache
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════
  # JOB 3 — Deploy notification
  # In Phase 3 this will deploy to Kubernetes
  # For now it confirms the image was pushed
  # ════════════════════════════════════════════════════
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push      # Wait for Job 2 to pass first

    steps:
      # Step 1 — Download code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Confirm deployment (Phase 3 will add real k8s deploy here)
      - name: Confirm deployment
        run: |
          echo "============================================"
          echo "  ShopAPI Deployment Summary"
          echo "============================================"
          echo "  Image: ${{ env.IMAGE_NAME }}:latest"
          echo "  Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "  Status: Successfully pushed to Docker Hub"
          echo "============================================"